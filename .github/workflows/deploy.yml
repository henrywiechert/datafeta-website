name: Deploy

# Builds the website Docker image, pushes to GHCR, and deploys to the VPS.
#
# Required GitHub Secrets (same as app repo):
#   VPS_HOST      VPS IP or hostname
#   VPS_USER      deploy
#   VPS_SSH_KEY   contents of ~/.ssh/datafeta_deploy (private key)
#
# GITHUB_TOKEN is used automatically for GHCR push.
# The GHCR package must be set to Public so the VPS can pull without auth.

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build image and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/henrywiechert/datafeta-website:${{ github.sha }}
            ghcr.io/henrywiechert/datafeta-website:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: /opt/datafeta-infra/scripts/deploy-website.sh ${{ github.sha }}
